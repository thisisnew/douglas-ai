name: DOUGLAS
options:
  bundleIdPrefix: com.douglas
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.35"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  DOUGLAS:
    type: application
    platform: macOS
    sources:
      - path: DOUGLAS
        excludes:
          - "Resources/Assets.xcassets/AppIcon.appiconset"
    resources:
      - path: DOUGLAS/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.douglas.app
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        PRODUCT_NAME: DOUGLAS
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_CFBundleDisplayName: "DOUGLAS"
        CODE_SIGN_ENTITLEMENTS: DOUGLAS/Resources/DOUGLAS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
