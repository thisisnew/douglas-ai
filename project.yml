name: AgentManager
options:
  bundleIdPrefix: com.agentmanager
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.35"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  AgentManager:
    type: application
    platform: macOS
    sources:
      - path: AgentManager
        excludes:
          - "Resources/Assets.xcassets/AppIcon.appiconset"
    resources:
      - path: AgentManager/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentmanager.app
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        PRODUCT_NAME: AgentManager
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_CFBundleDisplayName: "Agent Manager"
        CODE_SIGN_ENTITLEMENTS: AgentManager/Resources/AgentManager.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
